name: agenticflow

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agenticflow}
      POSTGRES_USER: ${POSTGRES_USER:-agenticflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agenticflow}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agenticflow}"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-unknown}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-agenticflow}:${POSTGRES_PASSWORD:-agenticflow}@postgres:5432/${POSTGRES_DB:-agenticflow}?sslmode=disable
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  daemon:
    build:
      context: .
      dockerfile: daemon/Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-unknown}
    environment:
      AF_SERVER_URL: http://server:8080
      AF_AUTH_TOKEN: ${AF_AUTH_TOKEN:-}
    depends_on:
      server:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_URL: http://localhost:${SERVER_PORT:-8080}
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  pgdata:
