version: 2

project_name: af

builds:
  - id: af
    main: ./cmd/af
    dir: daemon
    binary: af
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: versioned
    formats:
      - tar.gz
    name_template: "af-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

homebrew_casks:
  - name: af
    ids:
      - versioned
    repository:
      owner: agenticflow
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/agenticflow/agenticflow"
    description: "AgenticFlow CLI — local agent runtime and management tool"
    license: "Apache-2.0"
    binaries:
      - af
