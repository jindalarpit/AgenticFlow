name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Build
        run: cd server && go build ./...

      - name: Test
        run: cd server && go test ./...

  validate-goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          install-only: true

      - name: Validate GoReleaser config
        run: goreleaser check

      - name: Run GoReleaser snapshot
        run: goreleaser release --snapshot --clean

      - name: Verify archive naming convention
        run: |
          echo "Checking snapshot archives match expected naming pattern..."
          ls dist/*.tar.gz
          for archive in dist/*.tar.gz; do
            basename="$(basename "$archive")"
            if ! echo "$basename" | grep -qE '^af-[0-9]+\.[0-9]+\.[0-9]+-SNAPSHOT-[a-f0-9]+-[a-z]+-[a-z0-9]+\.tar\.gz$'; then
              # Snapshot versions use a different format; check the base pattern
              if ! echo "$basename" | grep -qE '^af-.*-(darwin|linux)-(amd64|arm64)\.tar\.gz$'; then
                echo "ERROR: Archive '$basename' does not match expected pattern af-{version}-{os}-{arch}.tar.gz"
                exit 1
              fi
            fi
          done
          echo "All archives match the expected naming convention."
