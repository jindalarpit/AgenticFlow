name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "!v*-dirty*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release_meta.outputs.tag_name }}
      is_stable: ${{ steps.release_meta.outputs.is_stable }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag name
        id: release_meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          echo "Triggered by tag: $tag"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tags must match vX.Y.Z or vX.Y.Z-suffix; got '$tag'."
            exit 1
          fi
          if [[ "$tag" == *-dirty* ]]; then
            echo "::error::Refusing to release from dirty tag '$tag'."
            exit 1
          fi
          echo "tag_name=$tag" >> "$GITHUB_OUTPUT"
          if [[ "$tag" == *-* ]]; then
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Run tests
        run: cd server && go test ./...

  release:
    needs: verify
    if: github.repository_owner == 'agenticflow'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
